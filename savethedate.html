<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Save the Date - Breno & Livia</title>
    <!-- Dependências inline para perfeita impressão em PDF -->
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600;700&family=Quicksand:wght@400;600;700&display=swap');

        /* Tamanho A5 Retrato para envio perfeito como imagem ou PDF no celular */
        @page {
            size: 148mm 210mm;
            margin: 0;
        }

        html, body {
            width: 148mm;
            height: 210mm;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
            background-color: #CBEFFF !important; /* Força a cor no PDF */
            background-image: 
                radial-gradient(circle at top left, #B2DFFB, transparent 40%),
                radial-gradient(circle at bottom right, #FFDEE9, transparent 50%) !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }

        .save-the-date-card {
            background-color: rgba(255, 255, 255, 0.95) !important;
            border: 4px solid white !important;
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            width: 80%;
            max-width: 320px;
            box-shadow: 0 15px 45px rgba(146, 180, 242, 0.25) !important;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
            position: relative;
        }
        
        .std-subtitle {
            font-family: 'Quicksand', sans-serif;
            font-size: 14px;
            color: #5C7A8D !important;
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 25px;
            font-weight: 600;
        }
        .std-names {
            font-family: 'Dancing Script', cursive;
            font-size: 55px;
            color: #92B4F2 !important;
            margin: 15px 0;
            line-height: 1.1;
        }
        .std-date {
            font-family: 'Quicksand', sans-serif;
            font-size: 24px;
            font-weight: 700;
            color: #2B4C5E !important;
            margin: 25px auto;
            padding: 15px 0;
            border-top: 1px dashed #92B4F2 !important;
            border-bottom: 1px dashed #92B4F2 !important;
            width: 80%;
            letter-spacing: 2px;
        }
        .std-ornament {
            font-size: 28px;
            color: #92B4F2 !important;
            margin: 10px 0;
            opacity: 0.8;
        }
        .btn-home {
            display: inline-block;
            margin-top: 25px;
            background-color: #92B4F2 !important;
            color: white !important;
            padding: 15px 30px;
            border-radius: 30px;
            text-decoration: none;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 16px;
            -webkit-print-color-adjust: exact !important;
            print-color-adjust: exact !important;
        }
    </style>
</head>
<body>

    <div class="save-the-date-card">
        <div class="std-ornament">🌿</div>
        
        <div class="std-subtitle">Save the Date</div>
        
        <div class="std-names">Breno<br>&<br>Livia</div>
        
        <div class="std-date">06 . 03 . 2027</div>
        
        <div class="std-ornament">✨</div>

        <!-- LINK PARA O SITE! -->
        <a href="https://bbispo368.github.io/casamento/" class="btn-home">Acessar nosso site</a>
    </div>

</body>
</html>
